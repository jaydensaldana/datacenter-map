name: Update Data Center Map

on:
  schedule:
    - cron: '0 6 1 * *'       # 1st of each month at 6am UTC
  workflow_dispatch:            # manual trigger from GitHub UI

jobs:
  update-map:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests openpyxl

      - name: Fetch data and build map
        env:
          GOOGLE_SHEET_ID: ${{ vars.GOOGLE_SHEET_ID || '1SWUPHFJT3K3phN8bB2iuPnyEgFCT1XfT' }}
        run: |
          python fetch_data.py
          python build_map.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ index.html
          git diff --staged --quiet || git commit -m "Auto-update: $(date +'%Y-%m-%d')"
          git push
