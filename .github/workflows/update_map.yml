name: Update Data Center Map

on:
  schedule:
    - cron: '0 6 1 * *'
  workflow_dispatch:

jobs:
  update-map:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests openpyxl

      - name: Fetch data and build map
        env:
          GOOGLE_SHEET_ID: ${{ vars.GOOGLE_SHEET_ID || '1ZtNh_GJCEzZ3zNxIjJad09ihbwT5UDBPfy7wK2f1gWo' }}
        run: |
          python fetch_data.py
          python build_map.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main --no-edit
          git add data/ index.html
          git diff --staged --quiet && echo "No changes" || (git commit -m "Auto-update $(date +'%Y-%m-%d')" && git push origin main)
