name: Update Data Center Map

on:
  schedule:
    - cron: '0 6 1 * *'
  workflow_dispatch:

jobs:
  update-map:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests openpyxl

      - name: Fetch data and build map
        env:
          GOOGLE_SHEET_ID: ${{ vars.GOOGLE_SHEET_ID || '1ZtNh_GJCEzZ3zNxIjJad09ihbwT5UDBPfy7wK2f1gWo' }}
        run: |
          python fetch_data.py
          python build_map.py

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update: data refresh"
          file_pattern: "data/* index.html"
          push_options: '--force'
